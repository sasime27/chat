<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>咒術の談話室</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 防止出現雙重滾動條 */
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 關鍵：透過負的 margin 或 top 來遮擋橫幅 */
        iframe {
            position: absolute;
            top: -20px; /* 向上推移約 20~25px，視橫幅高度而定 */
            left: 0;
            width: 100%;
            height: calc(100% + 20px); /* 補回被推移的高度 */
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe src="https://script.google.com/macros/s/AKfycbzMJDTJSFqcjj0aZ6-GlmmdbBQzU4hV5ClUs6R6zX3hHczeT1Hr-suUbVeSUo0lL8Wxog/exec"></iframe>
    </div>

</body>
</html>
